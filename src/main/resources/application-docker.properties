spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

ingoboka.security.jwt.secret=${JWT_SECRET}
ingoboka.seed.platform-admin.enabled=${SEED_PLATFORM_ADMIN:true}

ingoboka.security.otp.storage=${OTP_STORAGE:redis}

ingoboka.storage.minio.enabled=${MINIO_ENABLED:true}
ingoboka.storage.minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
ingoboka.storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
ingoboka.storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
ingoboka.storage.minio.bucket=${MINIO_BUCKET:ingoboka-documents}

ingoboka.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
