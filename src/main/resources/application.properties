spring.application.name=ingoboka-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ingoboka}
spring.datasource.username=${DB_USERNAME:ingoboka}
spring.datasource.password=${DB_PASSWORD:ingoboka}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

ingoboka.security.otp.expiration-minutes=10
ingoboka.security.otp.storage=${OTP_STORAGE:redis}
# EMAIL (default, no SMS cost) | SMS (MTN bulk) | LOG (dev only — OTP in API logs)
ingoboka.security.otp.delivery-channel=${OTP_DELIVERY_CHANNEL:email}

ingoboka.storage.minio.enabled=${MINIO_ENABLED:true}
ingoboka.storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
ingoboka.storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
ingoboka.storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
ingoboka.storage.minio.bucket=${MINIO_BUCKET:ingoboka-documents}

ingoboka.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://ingoboka-platform.vercel.app,http://localhost:3000}

ingoboka.enrollment.sandbox-auto-approve=${SANDBOX_AUTO_APPROVE:true}

ingoboka.sms.mtn-bulk.enabled=${MTN_BULK_SMS_ENABLED:false}
ingoboka.sms.mtn-bulk.api-url=${MTN_BULK_SMS_API_URL:https://bulk.mtn.co.rw/api/send}
ingoboka.sms.mtn-bulk.api-key=${MTN_BULK_SMS_API_KEY:}
ingoboka.sms.mtn-bulk.sender-id=${MTN_BULK_SMS_SENDER_ID:INGOBOKA}

ingoboka.policy.lifecycle.grace-period-days=30
ingoboka.policy.lifecycle.cron=0 0 2 * * *

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

# ===== SMTP / MAIL =====
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

ingoboka.security.jwt.secret=${JWT_SECRET:change-me-in-production-use-at-least-256-bits-secret-key}
ingoboka.security.jwt.access-token-expiration-minutes=30
ingoboka.security.jwt.refresh-token-expiration-days=7
ingoboka.security.verification-token-expiration-hours=24
ingoboka.security.password-reset-token-expiration-hours=1
ingoboka.security.activation-token-expiration-hours=72

ingoboka.platform.name=Ingoboka Platform
ingoboka.platform.frontend-login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}
ingoboka.platform.frontend-verify-email-url=${FRONTEND_VERIFY_EMAIL_URL:http://localhost:3000/verify-email}
ingoboka.seed.platform-admin.enabled=true
ingoboka.seed.platform-admin.email=agressive.one04@gmail.com
ingoboka.seed.platform-admin.phone=+250794415318
ingoboka.seed.platform-admin.password=admin@123

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
