services:
  postgres:
    image: postgres:16-alpine
    container_name: ingoboka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ingoboka}
      POSTGRES_USER: ${POSTGRES_USER:-ingoboka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ingoboka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ingoboka-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ingoboka} -d ${POSTGRES_DB:-ingoboka}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ingoboka-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ingoboka-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ingoboka-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - ingoboka-net

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ingoboka-api:${IMAGE_TAG:-latest}
    container_name: ingoboka-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ingoboka}
      DB_USERNAME: ${POSTGRES_USER:-ingoboka}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ingoboka}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      MAIL_HEALTH_ENABLED: ${MAIL_HEALTH_ENABLED:-false}
      SEED_PLATFORM_ADMIN: ${SEED_PLATFORM_ADMIN:-true}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-agressive.one04@gmail.com}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-admin@123}
      PLATFORM_ADMIN_PHONE: ${PLATFORM_ADMIN_PHONE:-+250794415318}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      FRONTEND_VERIFY_EMAIL_URL: ${FRONTEND_VERIFY_EMAIL_URL:-http://localhost:3000/verify-email}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ingoboka-documents}
      OTP_STORAGE: redis
      OTP_DELIVERY_CHANNEL: ${OTP_DELIVERY_CHANNEL:-email}
      MTN_BULK_SMS_ENABLED: ${MTN_BULK_SMS_ENABLED:-false}
    ports:
      - "${API_PORT:-8085}:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - ingoboka-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

networks:
  ingoboka-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
